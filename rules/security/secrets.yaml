rules:
  # ── Hardcoded Secrets (Generic) ────────────────────────────────────
  - id: sec.secrets.hardcoded
    description: >
      Hardcoded credentials, API keys, passwords, or tokens in source code.
      Patterns: string literals assigned to variables named password, secret,
      api_key, token, credential, etc. Also flag connection strings with
      embedded passwords (postgres://user:pass@host).
    scope: "**/*.{py,js,ts,rb,go,rs,java,kt,cs,php,yaml,yml,json,toml,xml,properties,env}"
    severity: error
    category: security
    tags: [secrets, hardcoded-credentials, owasp-a07, cwe-798]
    source: diffscope-builtin

  # ── Cloud Provider Keys ────────────────────────────────────────────
  - id: sec.secrets.aws
    description: >
      AWS credentials in source code. Access Key IDs start with AKIA/ASIA/ABIA/ACCA
      followed by 16 alphanumeric chars. Secret keys are 40-char base64 strings
      near AWS context keywords. Also check for AWS Bedrock keys (ABSK prefix).
    scope: "**/*"
    severity: error
    category: security
    tags: [secrets, aws, cloud-credentials, owasp-a07, cwe-798]
    source: diffscope-builtin

  - id: sec.secrets.gcp
    description: >
      GCP credentials in source code. Service account JSON files with
      "type": "service_account", API keys starting with AIza, OAuth client secrets.
    scope: "**/*"
    severity: error
    category: security
    tags: [secrets, gcp, cloud-credentials, owasp-a07, cwe-798]
    source: diffscope-builtin

  # ── API Provider Tokens ────────────────────────────────────────────
  - id: sec.secrets.github-token
    description: >
      GitHub tokens in source code. Prefixes: ghp_ (PAT), gho_ (OAuth),
      ghs_ (app), ghu_ (user-to-server), ghr_ (refresh), github_pat_ (fine-grained).
    scope: "**/*"
    severity: error
    category: security
    tags: [secrets, github-token, owasp-a07, cwe-798]
    source: diffscope-builtin

  - id: sec.secrets.slack-token
    description: >
      Slack tokens in source code. Prefixes: xoxb- (bot), xoxp-/xoxe- (user),
      xapp- (app-level), xoxr- (legacy). Also webhook URLs matching
      hooks.slack.com/services/*.
    scope: "**/*"
    severity: error
    category: security
    tags: [secrets, slack-token, owasp-a07, cwe-798]
    source: diffscope-builtin

  - id: sec.secrets.stripe-key
    description: >
      Stripe API keys in source code. Patterns: sk_live_*, sk_test_*,
      rk_live_*, rk_test_*. Live keys are critical, test keys are warnings.
    scope: "**/*"
    severity: error
    category: security
    tags: [secrets, stripe-key, owasp-a07, cwe-798]
    source: diffscope-builtin

  - id: sec.secrets.openai-key
    description: >
      OpenAI API keys in source code. Pattern contains T3BlbkFJ marker
      (base64 of "OpenAI"). Also sk-proj-*, sk-svcacct-*, sk-admin-* prefixes.
    scope: "**/*"
    severity: error
    category: security
    tags: [secrets, openai-key, owasp-a07, cwe-798]
    source: diffscope-builtin

  - id: sec.secrets.anthropic-key
    description: >
      Anthropic API keys in source code. Patterns: sk-ant-api03-* (API key),
      sk-ant-admin01-* (admin key). 93+ character base64 body ending in AA.
    scope: "**/*"
    severity: error
    category: security
    tags: [secrets, anthropic-key, owasp-a07, cwe-798]
    source: diffscope-builtin

  # ── Private Keys & Certificates ────────────────────────────────────
  - id: sec.secrets.private-key
    description: >
      Private keys embedded in source code. Patterns:
      -----BEGIN RSA PRIVATE KEY-----, -----BEGIN EC PRIVATE KEY-----,
      -----BEGIN OPENSSH PRIVATE KEY-----, -----BEGIN PGP PRIVATE KEY BLOCK-----,
      -----BEGIN PRIVATE KEY-----, PuTTY-User-Key-File-2.
      Also flag .p12/.pfx files committed to the repository.
    scope: "**/*"
    severity: error
    category: security
    tags: [secrets, private-key, owasp-a07, cwe-321]
    source: diffscope-builtin

  # ── JWT & Session Secrets ──────────────────────────────────────────
  - id: sec.secrets.jwt-token
    description: >
      JWT tokens in source code. Pattern: eyJ...\.eyJ...\.* (base64-encoded
      JSON header.payload.signature). May contain sensitive claims or be
      a long-lived token that should be rotated.
    scope: "**/*"
    severity: warning
    category: security
    tags: [secrets, jwt, owasp-a07, cwe-798]
    source: diffscope-builtin

  # ── Database Connection Strings ────────────────────────────────────
  - id: sec.secrets.connection-string
    description: >
      Database connection strings with embedded credentials.
      Patterns: postgres://user:password@host, mysql://user:pass@host,
      mongodb://user:pass@host, redis://:password@host.
      Should use environment variables or secrets manager instead.
    scope: "**/*.{py,js,ts,rb,go,rs,java,kt,cs,php,yaml,yml,json,toml,xml,env,properties}"
    severity: error
    category: security
    tags: [secrets, connection-string, owasp-a07, cwe-798]
    source: diffscope-builtin

  # ── Secrets in Logs ────────────────────────────────────────────────
  - id: sec.secrets.logged
    description: >
      Sensitive data (tokens, passwords, API keys, PII) included in log
      statements, error messages, or debug output. Check for config structs
      containing secrets printed with Debug/Display, and for secret variables
      in format strings passed to logging macros/functions.
    scope: "**/*.{py,js,ts,rb,go,rs,java,kt,cs}"
    severity: warning
    category: security
    tags: [secrets, logging, data-exposure, owasp-a09, cwe-532]
    source: diffscope-builtin
